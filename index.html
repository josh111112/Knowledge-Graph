<!DOCTYPE html>
<html class="light" lang="en">
<head>
    <meta charset="utf-8">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <title>Terra — Research Knowledge Graph</title>
    <!-- Material Symbols -->
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet">
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Literata:ital,opsz,wght@0,7..72,200..900;1,7..72,200..900&amp;family=Nunito+Sans:ital,opsz,wght@0,6..12,200..1000;1,6..12,200..1000&amp;display=swap" rel="stylesheet">
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script id="tailwind-config">
        tailwind.config = {
          darkMode: "class",
          theme: {
            extend: {
              colors: {
                "secondary-container": "#f0e8db",
                "on-tertiary-fixed": "#221a05",
                "on-error-container": "#690005",
                "background": "#faf6f0",
                "primary-fixed-dim": "#8ecf9e",
                "tertiary-fixed": "#f8e0a8",
                "on-surface": "#2e3230",
                "surface-bright": "#faf6f0",
                "secondary-fixed": "#f0e8db",
                "on-tertiary": "#ffffff",
                "surface-container-low": "#f5f1ea",
                "primary": "#4a7c59",
                "on-secondary": "#ffffff",
                "inverse-surface": "#2e3230",
                "surface": "#faf6f0",
                "outline-variant": "#c4c8bc",
                "on-secondary-container": "#5e5548",
                "surface-tint": "#4a7c59",
                "surface-dim": "#dbd7cf",
                "on-surface-variant": "#4a4e4a",
                "tertiary-fixed-dim": "#dcc48e",
                "surface-container-lowest": "#ffffff",
                "on-tertiary-container": "#554020",
                "tertiary": "#705c30",
                "on-primary-fixed": "#002110",
                "error-container": "#ffdad8",
                "outline": "#74796e",
                "secondary": "#6b6358",
                "on-background": "#2e3230",
                "primary-container": "#78a886",
                "tertiary-container": "#c4a66a",
                "surface-container-high": "#eae6de",
                "secondary-fixed-dim": "#d4ccbf",
                "on-primary": "#ffffff",
                "on-secondary-fixed-variant": "#4a4538",
                "surface-container-highest": "#e4e0d8",
                "error": "#b83230",
                "on-tertiary-fixed-variant": "#554020",
                "inverse-primary": "#8ecf9e",
                "on-secondary-fixed": "#1e1a13",
                "on-primary-fixed-variant": "#2a6038",
                "surface-container": "#f0ece4",
                "primary-fixed": "#c8e8d0"
              },
              fontFamily: {
                "headline": ["Literata"],
                "body": ["Nunito Sans"],
                "label": ["Nunito Sans"]
              },
              borderRadius: {"DEFAULT": "0.5rem", "lg": "1rem", "xl": "1.5rem", "full": "9999px"},
            },
          },
        }
    </script>
    <style>
        .material-symbols-outlined {
          font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
        }
        body {
          background-color: #faf6f0;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 6px; }
        ::-webkit-scrollbar-track { background: transparent; }
        ::-webkit-scrollbar-thumb { background: #c4c8bc; border-radius: 10px; }
        ::-webkit-scrollbar-thumb:hover { background: #4a7c59; }
    </style>
</head>
<body class="font-body text-on-surface flex h-screen overflow-hidden">
    <!-- SideNavBar -->
    <aside class="fixed left-0 top-0 h-full flex flex-col p-4 z-40 bg-[#faf6f0] dark:bg-stone-950 h-screen w-64 border-r border-stone-200 dark:border-stone-800 font-['Nunito_Sans'] text-sm font-medium">
        <div class="flex items-center gap-3 mb-8 px-2">
            <div class="w-10 h-10 rounded-xl overflow-hidden bg-primary-container flex items-center justify-center">
                <span class="material-symbols-outlined text-white text-2xl" data-icon="hub">hub</span>
            </div>
            <div>
                <h1 class="font-['Literata'] text-lg font-bold text-[#4a7c59]">Terra AI</h1>
                <p class="text-xs text-stone-500">Research Assistant</p>
            </div>
        </div>
        <nav class="flex-1 flex flex-col gap-1">
            <a class="flex items-center gap-3 bg-[#4a7c59]/10 text-[#4a7c59] rounded-xl px-4 py-2 hover:bg-stone-200/50 transition-all duration-200 ease-in-out active:scale-95" href="/">
                <span class="material-symbols-outlined" data-icon="chat">chat</span>
                <span>New Inquiry</span>
            </a>
        </nav>
    </aside>

    <!-- Main Content Wrapper -->
    <main class="ml-64 flex-1 flex flex-col relative h-screen bg-background">
        <!-- TopAppBar -->
        <header class="flex justify-between items-center w-full px-6 py-3 bg-[#faf6f0] border-b border-stone-200 z-30 sticky top-0">
            <div class="flex items-center gap-4">
                <span class="text-xl font-bold text-[#4a7c59] font-headline">Knowledge Discovery</span>
            </div>
        </header>

        <!-- Chat Area -->
        <section id="chat-area" class="flex-1 overflow-y-auto p-6 md:px-24 lg:px-48 space-y-6 scroll-smooth pb-32">
            <!-- Intro Info -->
            <div class="flex flex-col items-center text-center mb-12" id="intro-area">
                <div class="w-16 h-16 rounded-3xl bg-primary/5 flex items-center justify-center mb-4">
                    <span class="material-symbols-outlined text-primary text-4xl" data-icon="schema">schema</span>
                </div>
                <h2 class="font-headline text-2xl font-semibold text-on-surface mb-2">Explore the Research Graph</h2>
                <p class="text-on-surface-variant max-w-md text-sm leading-relaxed">
                    Ask questions about fusion methods, datasets, and paper uncertainties.
                </p>
            </div>
            <!-- Dynamic Messages will appear here -->
        </section>

        <!-- Bottom Input Area -->
        <div class="absolute bottom-0 left-0 w-full p-6 md:px-24 lg:px-48 bg-gradient-to-t from-background via-background to-transparent pb-8">
            <form id="chat-form" class="max-w-4xl mx-auto flex items-end gap-3 bg-surface-container-low p-2 rounded-2xl border border-outline-variant/30 shadow-sm focus-within:ring-2 focus-within:ring-primary/20 transition-all">
                <textarea id="user-input" class="flex-1 bg-transparent border-none focus:ring-0 text-on-surface placeholder:text-stone-400 py-3 resize-none font-body max-h-32" placeholder="Ask about research papers..." rows="1"></textarea>
                <button type="submit" class="p-3 bg-primary text-on-primary rounded-xl hover:shadow-lg hover:brightness-110 transition-all active:scale-95 flex items-center justify-center">
                    <span class="material-symbols-outlined" style="font-variation-settings: 'FILL' 1;">send</span>
                </button>
            </form>
            <p class="text-[10px] text-center text-stone-400 mt-3 font-label">Terra AI retrieves information from the Research Knowledge Graph.</p>
        </div>
    </main>

    <script>
        const chatForm = document.getElementById('chat-form');
        const userInput = document.getElementById('user-input');
        const chatArea = document.getElementById('chat-area');
        const introArea = document.getElementById('intro-area');

        function addMessage(text, isUser = false) {
            if (introArea) introArea.style.display = 'none';
            
            const bubble = document.createElement('div');
            bubble.className = `flex items-start gap-4 max-w-3xl ${isUser ? 'ml-auto flex-row-reverse' : 'mr-auto'}`;
            
            const iconBg = isUser ? 'bg-surface-container-highest' : 'bg-primary-container';
            const iconContent = isUser ? 
                `<span class="material-symbols-outlined text-on-surface-variant text-sm">person</span>` : 
                `<span class="material-symbols-outlined text-white text-xs" style="font-variation-settings: 'FILL' 1;">psychology</span>`;
            
            const bubbleContentClass = isUser ? 
                'bg-primary text-on-primary rounded-tr-none' : 
                'bg-surface-container-high text-on-surface rounded-tl-none border border-outline-variant/10';

            bubble.innerHTML = `
                <div class="w-8 h-8 rounded-lg ${iconBg} shrink-0 flex items-center justify-center mt-1">
                    ${iconContent}
                </div>
                <div class="${bubbleContentClass} p-5 rounded-xl shadow-sm">
                    <div class="leading-relaxed font-body whitespace-pre-wrap">${text}</div>
                    <span class="text-[10px] ${isUser ? 'text-white/70' : 'text-on-surface-variant/60'} block mt-2 font-label">
                        ${isUser ? 'You' : 'Terra AI'} • ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                    </span>
                </div>
            `;
            
            chatArea.appendChild(bubble);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        function escapeHtml(unsafe) {
            return unsafe
                 .replace(/&/g, "&amp;")
                 .replace(/</g, "&lt;")
                 .replace(/>/g, "&gt;")
                 .replace(/"/g, "&quot;")
                 .replace(/'/g, "&#039;");
        }

        function addResponse(summary, items) {
            if (introArea) introArea.style.display = 'none';
            
            const bubble = document.createElement('div');
            bubble.className = 'flex items-start gap-4 max-w-4xl mr-auto';
            
            let listHtml = '';
            if (items && items.length > 0) {
                listHtml = `
                    <div class="mt-4 pt-4 border-t border-outline-variant/20">
                        <p class="text-xs text-on-surface-variant font-semibold mb-2">Sources from Graph:</p>
                        <div class="grid grid-cols-1 gap-2">
                            ${items.map(item => `
                                <div class="bg-surface p-3 rounded-lg border border-outline-variant/30 hover:border-primary/30 transition-colors">
                                    <p class="text-xs text-on-surface font-body">${escapeHtml(item)}</p>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }

            bubble.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-primary-container shrink-0 flex items-center justify-center mt-1">
                    <span class="material-symbols-outlined text-white text-xs" style="font-variation-settings: 'FILL' 1;">psychology</span>
                </div>
                <div class="bg-surface-container-high p-6 rounded-xl rounded-tl-none shadow-sm border border-outline-variant/10 w-full">
                    <div class="text-on-surface leading-relaxed font-body whitespace-pre-wrap">${escapeHtml(summary)}</div>
                    ${listHtml}
                    <span class="text-[10px] text-on-surface-variant/60 block mt-4 font-label">
                        Terra AI • ${new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' })}
                    </span>
                </div>
            `;
            
            chatArea.appendChild(bubble);
            chatArea.scrollTop = chatArea.scrollHeight;
        }

        chatForm.addEventListener('submit', async (e) => {
            e.preventDefault();
            const text = userInput.value.trim();
            if (!text) return;

            addMessage(text, true);
            userInput.value = '';
            
            // Add loading indicator
            const loadingBubble = document.createElement('div');
            loadingBubble.id = 'loading';
            loadingBubble.className = 'flex items-start gap-4 max-w-3xl mr-auto animate-pulse';
            loadingBubble.innerHTML = `
                <div class="w-8 h-8 rounded-lg bg-primary-container shrink-0 flex items-center justify-center mt-1">
                    <span class="material-symbols-outlined text-white text-xs" style="font-variation-settings: 'FILL' 1;">psychology</span>
                </div>
                <div class="bg-surface-container-high p-5 rounded-xl rounded-tl-none border border-outline-variant/10">
                    <p class="text-on-surface-variant text-sm italic">Searching the graph and summarizing...</p>
                </div>
            `;
            chatArea.appendChild(loadingBubble);
            chatArea.scrollTop = chatArea.scrollHeight;

            try {
                const response = await fetch('http://localhost:5001/query', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ query: text })
                });
                
                const data = await response.json();
                chatArea.removeChild(loadingBubble);
                
                if (data.summary) {
                    addResponse(data.summary, data.responses);
                } else if (data.error) {
                    addMessage("Sorry, I encountered an error: " + data.error);
                } else {
                    addMessage("I couldn't find any information matching your query.");
                }
            } catch (error) {
                if (loadingBubble.parentNode) chatArea.removeChild(loadingBubble);
                addMessage("Failed to connect to the backend server. Please ensure it is running.");
            }
        });

        // Auto-resize textarea
        userInput.addEventListener('input', function() {
            this.style.height = 'auto';
            this.style.height = (this.scrollHeight) + 'px';
        });
    </script>
</body>
</html>
